spring.application.name=contacts-api

spring.h2.console.enabled=false

# Configuraçőes do Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/contacts_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraçőes do JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
